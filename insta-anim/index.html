<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VVV — Typography Flipper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kristi&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0a0d;
    --panel:#171319;
    --panel-line:rgba(255,255,255,0.10);
    --magenta:#ec00cf;
    --ink:#f4f0f5;
    --muted:#8d8794;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:28px;
  }
  .wrap{width:100%;max-width:740px;}
  .eyebrow{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin:0 0 10px 3px;
  }
  .version-tag{
    letter-spacing:.04em;text-transform:none;color:#5d5763;
    font-weight:600;
  }
  .stage{
    position:relative;width:100%;border-radius:14px;overflow:hidden;
    background:#000;
    box-shadow:0 0 0 1px rgba(236,0,207,0.28), 0 30px 70px -25px rgba(0,0,0,0.7);
  }
  canvas{display:block;width:100%;height:auto;}
  .gif-overlay{
    position:absolute;inset:0;background:rgba(8,6,10,0.82);
    display:flex;align-items:center;justify-content:center;
  }
  .gif-overlay[hidden]{display:none;}
  .gif-overlay-inner{text-align:center;font-size:13px;color:#fff;}
  .spinner{
    width:26px;height:26px;border-radius:50%;
    border:3px solid rgba(255,255,255,0.25);border-top-color:var(--magenta);
    margin:0 auto 10px;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .controls{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .ctrl{
    flex:1;min-width:130px;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 14px;border-radius:10px;border:1px solid var(--panel-line);
    background:var(--panel);color:var(--ink);font-size:13.5px;font-weight:600;
    cursor:pointer;transition:border-color .15s,transform .1s,opacity .15s;
  }
  .ctrl .ic{font-size:14px;line-height:1;}
  .ctrl:hover:not(:disabled){border-color:var(--magenta);}
  .ctrl:active:not(:disabled){transform:scale(0.97);}
  .ctrl:disabled{opacity:.35;cursor:default;}
  .ctrl.ghost{background:transparent;}
  .divider{width:1px;align-self:stretch;background:var(--panel-line);margin:2px;}
  @media (max-width:520px){
    .divider{display:none;}
    .ctrl{min-width:44%;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">VVV — Typography Flipper <span class="version-tag">v1.2</span></div>
    <div class="stage">
      <canvas id="canvas" width="2124" height="1192"></canvas>
      <video id="bgVideo" muted loop playsinline preload="auto" style="position:absolute;width:2px;height:2px;top:-9999px;left:-9999px;opacity:0.01;"></video>
      <video id="exportVideo" muted playsinline preload="auto" style="position:absolute;width:2px;height:2px;top:-9999px;left:-9999px;opacity:0.01;"></video>
      <div class="gif-overlay" id="gifOverlay" hidden>
        <div class="gif-overlay-inner">
          <div class="spinner"></div>
          <div id="gifStatus">Preparing…</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button id="pauseBtn" class="ctrl" title="Pause">
        <span class="ic">⏸</span><span>Pause</span>
      </button>
      <button id="playBtn" class="ctrl" title="Play" disabled>
        <span class="ic">▶</span><span>Play</span>
      </button>
      <div class="divider"></div>
      <button id="bgBtn" class="ctrl ghost" title="Switch the background video">
        <span class="ic">↻</span><span>Switch Background</span>
      </button>
      <div class="divider"></div>
      <button id="pngBtn" class="ctrl ghost" title="Export the current view as a PNG">
        <span class="ic">⭳</span><span>Export PNG</span>
      </button>
      <button id="gifBtn" class="ctrl ghost" title="Export the full looping animation as a GIF">
        <span class="ic">⭳</span><span>Export GIF</span>
      </button>
      <button id="mp4Btn" class="ctrl ghost" title="Export the full looping animation as an MP4 video">
        <span class="ic">⭳</span><span>Export MP4</span>
      </button>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
(function(){
  const FONTS = [
    { name:'Times New Roman',        css:'"Times New Roman", Times, serif' },
    { name:'Impact',                 css:'Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif' },
    { name:'Courier New',            css:'"Courier New", Courier, monospace' },
    { name:'Brush Script',           css:'"Brush Script MT", "Segoe Script", cursive' },
    { name:'Papyrus',                css:'Papyrus, fantasy' },
    { name:'Georgia',                css:'Georgia, serif' },
    { name:'Copperplate',            css:'Copperplate, "Copperplate Gothic Bold", serif' },
    { name:'Comic Sans',             css:'"Comic Sans MS", "Comic Sans", cursive' },
    { name:'Arial Black',            css:'"Arial Black", "Arial Bold", sans-serif' },
    { name:'Palatino',               css:'"Palatino Linotype", Palatino, serif' },
    { name:'Trebuchet MS',           css:'"Trebuchet MS", sans-serif' },
    { name:'Didot',                  css:'Didot, "Bodoni MT", serif' },
    { name:'Kristi',                 css:'"Kristi", cursive', sizeMult: 1.4 },
    { name:'American Typewriter',    css:'"American Typewriter", Courier, serif' },
    { name:'Andale Mono',            css:'"Andale Mono", monospace' },
    { name:'Avenir Next',            css:'"Avenir Next", Avenir, "Century Gothic", sans-serif' },
    { name:'Baskerville',            css:'Baskerville, "Baskerville Old Face", Garamond, serif' },
    { name:'Big Caslon',             css:'"Big Caslon", Garamond, serif' },
    { name:'Bradley Hand',           css:'"Bradley Hand", "Segoe Print", cursive' },
    { name:'Chalkboard SE',          css:'"Chalkboard SE", Chalkboard, "Comic Sans MS", cursive' },
    { name:'Chalkduster',            css:'Chalkduster, fantasy' },
    { name:'Cochin',                 css:'Cochin, Garamond, serif' },
    { name:'DIN Condensed',          css:'"DIN Condensed", "DIN Alternate", "Arial Narrow", sans-serif' },
    { name:'Futura',                 css:'Futura, "Century Gothic", sans-serif' },
    { name:'Kristi',                 css:'"Kristi", cursive', sizeMult: 1.4 },
    { name:'Geneva',                 css:'Geneva, "Segoe UI", sans-serif' },
    { name:'Gill Sans',              css:'"Gill Sans", "Gill Sans MT", sans-serif' },
    { name:'Helvetica Neue',         css:'"Helvetica Neue", Helvetica, Arial, sans-serif' },
    { name:'Herculanum',             css:'Herculanum, fantasy' },
    { name:'Hoefler Text',           css:'"Hoefler Text", Garamond, serif' },
    { name:'Luminari',               css:'Luminari, fantasy' },
    { name:'Marker Felt',            css:'"Marker Felt", "Comic Sans MS", cursive' },
    { name:'Menlo',                  css:'Menlo, Consolas, monospace' },
    { name:'Monaco',                 css:'Monaco, Consolas, monospace' },
    { name:'Noteworthy',             css:'Noteworthy, "Comic Sans MS", cursive' },
    { name:'Optima',                 css:'Optima, Candara, sans-serif' },
    { name:'Phosphate',              css:'Phosphate, fantasy' },
    { name:'Kristi',                 css:'"Kristi", cursive', sizeMult: 1.4 },
    { name:'Rockwell',               css:'Rockwell, "Rockwell Extra Bold", serif' },
    { name:'Savoye LET',             css:'"Savoye LET", "Brush Script MT", cursive' },
    { name:'SignPainter',            css:'SignPainter, "Brush Script MT", cursive' },
    { name:'Skia',                   css:'Skia, "Trebuchet MS", sans-serif' },
    { name:'Snell Roundhand',        css:'"Snell Roundhand", "Brush Script MT", cursive' },
    { name:'Trattatello',            css:'Trattatello, fantasy' },
    { name:'Zapfino',                css:'Zapfino, "Brush Script MT", cursive' },
    { name:'Calibri',                css:'Calibri, Candara, sans-serif' },
    { name:'Cambria',                css:'Cambria, Georgia, serif' },
    { name:'Candara',                css:'Candara, Calibri, sans-serif' },
    { name:'Consolas',               css:'Consolas, Monaco, monospace' },
    { name:'Constantia',             css:'Constantia, Cambria, serif' },
    { name:'Kristi',                 css:'"Kristi", cursive', sizeMult: 1.4 },
    { name:'Corbel',                 css:'Corbel, Candara, sans-serif' },
    { name:'Franklin Gothic Medium', css:'"Franklin Gothic Medium", "Arial Narrow", sans-serif' },
    { name:'Lucida Console',         css:'"Lucida Console", Monaco, monospace' },
    { name:'Lucida Sans Unicode',    css:'"Lucida Sans Unicode", "Lucida Grande", sans-serif' },
    { name:'Segoe Print',            css:'"Segoe Print", "Comic Sans MS", cursive' },
    { name:'Segoe Script',           css:'"Segoe Script", "Brush Script MT", cursive' },
    { name:'Segoe UI Black',         css:'"Segoe UI Black", "Segoe UI", sans-serif' },
    { name:'Tahoma',                 css:'Tahoma, Geneva, sans-serif' },
    { name:'Verdana',                css:'Verdana, Geneva, sans-serif' },
    { name:'Bahnschrift',            css:'Bahnschrift, "DIN Condensed", sans-serif' },
    { name:'Gabriola',               css:'Gabriola, cursive' },
    { name:'Ink Free',               css:'"Ink Free", cursive' },
    { name:'Kristi',                 css:'"Kristi", cursive', sizeMult: 1.4 },
    { name:'Bodoni 72',              css:'"Bodoni 72", Didot, serif' },
    { name:'Charter',                css:'Charter, Georgia, serif' },
    { name:'DejaVu Serif',           css:'"DejaVu Serif", Georgia, serif' },
    { name:'DejaVu Sans',            css:'"DejaVu Sans", Verdana, sans-serif' },
    { name:'DejaVu Sans Mono',       css:'"DejaVu Sans Mono", monospace' },
    { name:'Liberation Serif',       css:'"Liberation Serif", "Times New Roman", serif' },
    { name:'Liberation Sans',        css:'"Liberation Sans", Arial, sans-serif' },
    { name:'Liberation Mono',        css:'"Liberation Mono", "Courier New", monospace' },
    { name:'Ubuntu',                 css:'Ubuntu, "Trebuchet MS", sans-serif' },
    { name:'Ubuntu Mono',            css:'"Ubuntu Mono", monospace' },
    { name:'Noto Serif',             css:'"Noto Serif", Georgia, serif' },
    { name:'Arial Narrow',           css:'"Arial Narrow", Arial, sans-serif' },
    { name:'Arial Rounded MT Bold',  css:'"Arial Rounded MT Bold", Arial, sans-serif' },
    { name:'Century Gothic',         css:'"Century Gothic", Futura, sans-serif' },
    { name:'Kristi',                 css:'"Kristi", cursive', sizeMult: 1.4 },
    { name:'Garamond',               css:'Garamond, Georgia, serif' },
    { name:'Perpetua',               css:'Perpetua, Garamond, serif' },
    { name:'Kristi',                 css:'"Kristi", cursive', sizeMult: 1.4 }
  ];

  const FLASH = 110;           // ms each typography is shown before flashing to the next
  const TOTAL = FLASH * FONTS.length;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  if (document.fonts && document.fonts.load) {
    document.fonts.load('700 200px Kristi').catch(function(){});
  }

  const bgVideo = document.getElementById('bgVideo');
  const exportVideo = document.getElementById('exportVideo');
  const BG_VIDEOS = ['video-blue-stroke-loop.mp4', 'video-blue-loop.mp4'];
  let currentBg = 0;

  function setBackground(index){
    currentBg = ((index % BG_VIDEOS.length) + BG_VIDEOS.length) % BG_VIDEOS.length;
    const url = BG_VIDEOS[currentBg];
    const wasPlaying = playing;
    bgVideo.src = url;
    bgVideo.load();
    exportVideo.src = url;
    exportVideo.load();
    if (wasPlaying) bgVideo.play().catch(function(){});
  }

  bgVideo.addEventListener('error', function(){ console.warn('Background video failed to load — make sure video-blue-stroke-loop.mp4 and video-blue-loop.mp4 sit next to this HTML file.'); });

  function fontIndexAt(t){
    const tt = ((t % TOTAL) + TOTAL) % TOTAL;
    return Math.floor(tt / FLASH) % FONTS.length;
  }

  function drawVVV(c, w, h, fontCss, sizeMult){
    const fontSize = 200 * (sizeMult || 1);
    c.save();
    c.translate(w / 2, h / 2);
    c.font = '700 ' + fontSize + 'px ' + fontCss;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillStyle = '#ffffff';
    c.fillText('VVV', 0, 0);
    c.restore();
  }

  function drawFrame(c, w, h, t){
    c.clearRect(0, 0, w, h);
    if (bgVideo.readyState >= 2) {
      c.drawImage(bgVideo, 0, 0, w, h);
    } else {
      c.fillStyle = '#0b0a0d';
      c.fillRect(0, 0, w, h);
    }
    const idx = fontIndexAt(t);
    drawVVV(c, w, h, FONTS[idx].css, FONTS[idx].sizeMult);
    return FONTS[idx].name;
  }

  // ---- live playback clock ----
  let accumulated = 0, lastTs = null, playing = false, rafId = null;
  const pauseBtn = document.getElementById('pauseBtn');
  const playBtn = document.getElementById('playBtn');

  function tick(now){
    if (!playing) return;
    if (lastTs === null) lastTs = now;
    accumulated += (now - lastTs);
    lastTs = now;
    const name = drawFrame(ctx, W, H, accumulated);
    rafId = requestAnimationFrame(tick);
  }

  function play(){
    if (playing) return;
    playing = true; lastTs = null;
    pauseBtn.disabled = false; playBtn.disabled = true;
    bgVideo.play().catch(function(){});
    rafId = requestAnimationFrame(tick);
  }
  function pause(){
    if (!playing) return;
    playing = false;
    if (rafId) cancelAnimationFrame(rafId);
    bgVideo.pause();
    pauseBtn.disabled = true; playBtn.disabled = false;
  }

  setBackground(0);
  play();

  pauseBtn.addEventListener('click', pause);
  playBtn.addEventListener('click', play);

  const bgBtn = document.getElementById('bgBtn');
  bgBtn.addEventListener('click', function(){ setBackground(currentBg + 1); });

  // ---- export PNG (current view, whatever is on screen right now) ----
  document.getElementById('pngBtn').addEventListener('click', function(){
    canvas.toBlob(function(blob){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'vvv-snapshot.png';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    }, 'image/png');
  });

  // ---- export looping GIF of the whole flip cycle ----
  const gifBtn = document.getElementById('gifBtn');
  const pngBtn = document.getElementById('pngBtn');
  const overlay = document.getElementById('gifOverlay');
  const gifStatus = document.getElementById('gifStatus');
  let workerUrlPromise = null;

  function seekVideo(videoEl, time){
    return new Promise(function(resolve){
      function onSeeked(){ videoEl.removeEventListener('seeked', onSeeked); resolve(); }
      videoEl.addEventListener('seeked', onSeeked);
      try { videoEl.currentTime = time; } catch (e) { videoEl.removeEventListener('seeked', onSeeked); resolve(); }
    });
  }

  function waitForVideoMetadata(videoEl){
    return new Promise(function(resolve){
      if (videoEl.readyState >= 1) { resolve(); return; }
      videoEl.addEventListener('loadedmetadata', function once(){
        videoEl.removeEventListener('loadedmetadata', once); resolve();
      });
    });
  }

  function getWorkerUrl(){
    if (!workerUrlPromise) {
      workerUrlPromise = fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js')
        .then(function(r){ if (!r.ok) throw new Error('worker fetch failed'); return r.blob(); })
        .then(function(b){ return URL.createObjectURL(b); });
    }
    return workerUrlPromise;
  }

  gifBtn.addEventListener('click', async function(){
    if (typeof GIF === 'undefined') {
      alert('The GIF encoder did not load — check your connection and try again.');
      return;
    }
    gifBtn.disabled = true; pngBtn.disabled = true; mp4Btn.disabled = true; bgBtn.disabled = true;
    overlay.hidden = false; gifStatus.textContent = 'Preparing…';
    try {
      const workerScript = await getWorkerUrl();
      await waitForVideoMetadata(exportVideo);
      const off = document.createElement('canvas');
      off.width = W; off.height = H;
      const octx = off.getContext('2d');
      const gif = new GIF({ workers: 3, quality: 10, workerScript: workerScript, width: W, height: H, repeat: 0 });

      gif.on('progress', function(p){
        gifStatus.textContent = 'Encoding… ' + Math.round(p * 100) + '%';
      });
      gif.on('finished', function(blob){
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'vvv-animation.gif';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
        overlay.hidden = true;
        gifBtn.disabled = false; pngBtn.disabled = false; mp4Btn.disabled = false; bgBtn.disabled = false;
      });

      gifStatus.textContent = 'Capturing frames…';
      const videoDuration = (exportVideo.duration && isFinite(exportVideo.duration)) ? exportVideo.duration : (TOTAL / 1000);
      for (let i = 0; i < FONTS.length; i++) {
        const vt = ((i * FLASH) / 1000) % videoDuration;
        await seekVideo(exportVideo, vt);
        octx.clearRect(0, 0, W, H);
        octx.drawImage(exportVideo, 0, 0, W, H);
        drawVVV(octx, W, H, FONTS[i].css, FONTS[i].sizeMult);
        gif.addFrame(octx, { copy: true, delay: FLASH });
        await new Promise(function(r){ setTimeout(r, 0); }); // keep UI responsive
      }
      gifStatus.textContent = 'Rendering GIF…';
      gif.render();
    } catch (err) {
      console.error(err);
      gifStatus.textContent = 'Export failed — please try again.';
      setTimeout(function(){
        overlay.hidden = true;
        gifBtn.disabled = false; pngBtn.disabled = false; mp4Btn.disabled = false; bgBtn.disabled = false;
      }, 1800);
    }
  });

  const mp4Btn = document.getElementById('mp4Btn');
  mp4Btn.addEventListener('click', async function(){
    if (!window.Mp4Exporter || !window.Mp4Exporter.supported) {
      alert('MP4 export needs a browser with WebCodecs support — Chrome or Edge work best. You can use the GIF export instead.');
      return;
    }
    mp4Btn.disabled = true; pngBtn.disabled = true; gifBtn.disabled = true; bgBtn.disabled = true;
    overlay.hidden = false; gifStatus.textContent = 'Preparing…';
    try {
      await waitForVideoMetadata(exportVideo);
      const off = document.createElement('canvas');
      off.width = W; off.height = H;
      const octx = off.getContext('2d');

      const FPS = 24;
      const FRAME_MS = 1000 / FPS;
      const videoDuration = (exportVideo.duration && isFinite(exportVideo.duration)) ? exportVideo.duration : (TOTAL / 1000);
      // Export exactly one full font cycle, aligned to frame boundaries
      const totalFrames = Math.round((TOTAL / 1000) * FPS);

      const blob = await window.Mp4Exporter.export(
        async function(i){
          const timeMs = i * FRAME_MS;
          const vt = (timeMs / 1000) % videoDuration;
          await seekVideo(exportVideo, vt);
          octx.clearRect(0, 0, W, H);
          octx.drawImage(exportVideo, 0, 0, W, H);
          const idx = fontIndexAt(timeMs);
          drawVVV(octx, W, H, FONTS[idx].css, FONTS[idx].sizeMult);
          return off;
        },
        totalFrames,
        FRAME_MS,
        W, H,
        function(i, total){ gifStatus.textContent = 'Encoding MP4… ' + Math.round((i / total) * 100) + '%'; }
      );

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'vvv-animation.mp4';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    } catch (err) {
      console.error(err);
      gifStatus.textContent = 'Export failed — please try again.';
      alert('MP4 export failed: ' + (err && err.message ? err.message : err));
    } finally {
      overlay.hidden = true;
      mp4Btn.disabled = false; pngBtn.disabled = false; gifBtn.disabled = false; bgBtn.disabled = false;
    }
  });
})();
</script>

<script type="module">
  (async function(){
    let Mp4Muxer;
    try {
      Mp4Muxer = await import('https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.mjs');
    } catch (e) {
      console.warn('Could not load the MP4 muxer library — MP4 export will be unavailable.', e);
      window.Mp4Exporter = { supported: false };
      return;
    }

    window.Mp4Exporter = {
      supported: typeof VideoEncoder !== 'undefined',

      // frameFn(i) draws frame i onto a canvas and returns that canvas.
      // frameCount frames total, each held for frameDurationMs in the final video.
      async export(frameFn, frameCount, frameDurationMs, width, height, onProgress){
        if (!this.supported) {
          throw new Error('This browser does not support the WebCodecs VideoEncoder API.');
        }
        const muxer = new Mp4Muxer.Muxer({
          target: new Mp4Muxer.ArrayBufferTarget(),
          video: { codec: 'avc', width: width, height: height },
          fastStart: 'in-memory'
        });

        const encoder = new VideoEncoder({
          output: function(chunk, meta){ muxer.addVideoChunk(chunk, meta); },
          error: function(e){ console.error('VideoEncoder error:', e); }
        });

        encoder.configure({
          codec: 'avc1.640034',
          width: width,
          height: height,
          bitrate: 80000000,
          framerate: 24
        });

        const durationUs = frameDurationMs * 1000;
        for (let i = 0; i < frameCount; i++) {
          const canvasEl = await frameFn(i);
          const frame = new VideoFrame(canvasEl, { timestamp: i * durationUs, duration: durationUs });
          while (encoder.encodeQueueSize > 4) {
            await new Promise(function(r){ setTimeout(r, 10); });
          }
          encoder.encode(frame, { keyFrame: true });
          frame.close();
          if (onProgress) onProgress(i + 1, frameCount);
        }

        await encoder.flush();
        encoder.close();
        muxer.finalize();
        return new Blob([muxer.target.buffer], { type: 'video/mp4' });
      }
    };
  })();
</script>
