<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VVV Logo Generator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#111;
  overflow:hidden;
  font-family:system-ui,sans-serif;
  user-select:none;
}
#stage {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    repeating-conic-gradient(#1a1a1a 0% 25%, #141414 0% 50%)
    0 0 / 20px 20px;
  overflow:hidden;
}
#frame {
  position:relative;
  flex-shrink:0;
  box-shadow: 0 8px 48px rgba(0,0,0,0.7);
  overflow:hidden;
}
#frame svg {
  display:block;
  width:100%;
  height:100%;
  overflow:visible;
}
/* draggable elements */
.draggable { cursor:grab; }
.draggable:active { cursor:grabbing; }
#zoom-label {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  letter-spacing:0.18em;
  color:rgba(255,255,255,0.3);
  text-transform:uppercase;
  pointer-events:none;
}
#controls {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  align-items:center;
  z-index:10;
}
button {
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  border:0.5px solid rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.7);
  font-size:10px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  padding:8px 28px;
  cursor:pointer;
  font-family:inherit;
  transition:border-color .15s, color .15s;
  white-space:nowrap;
}
button:hover { border-color:rgba(255,255,255,0.6); color:#fff; }
button:active { transform:scale(0.97); }
#hint {
  position:fixed;
  bottom:44px;
  left:50%;
  transform:translateX(-50%);
  font-size:9px;
  letter-spacing:0.15em;
  color:rgba(255,255,255,0.18);
  text-transform:uppercase;
  pointer-events:none;
  white-space:nowrap;
}


/* Transform overlay */
#xform-overlay {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  pointer-events:none; z-index:20; overflow:visible;
}
/* Floating toolbar */
#xform-toolbar {
  display:none; position:fixed;
  background:rgba(0,0,0,0.88); backdrop-filter:blur(12px);
  border:0.5px solid rgba(255,255,255,0.15);
  padding:8px 14px; z-index:40;
  gap:12px; align-items:center; white-space:nowrap;
}
#xform-toolbar.visible { display:flex; }
.xtb-group { display:flex; align-items:center; gap:5px; }
.xtb-lbl { font-size:8px; letter-spacing:0.14em; color:rgba(255,255,255,0.35); text-transform:uppercase; }
.xtb-val { font-size:10px; color:rgba(255,255,255,0.75); width:34px; text-align:center; font-variant-numeric:tabular-nums; }
.xtb-sep { width:1px; height:16px; background:rgba(255,255,255,0.1); }
.xtb-btn { font-size:11px; color:rgba(255,255,255,0.5); background:none; border:none; cursor:pointer; padding:2px 5px; font-family:inherit; }
.xtb-btn:hover { color:#fff; }

/* Light/dark toggle */
#lamp-btn {
  position:fixed; bottom:20px; right:20px;
  width:36px; height:36px; border-radius:50%;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(8px);
  border:0.5px solid rgba(255,255,255,0.2);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  z-index:30; transition:background .2s, border-color .2s;
  padding:0;
}
#lamp-btn:hover { border-color:rgba(255,255,255,0.5); background:rgba(0,0,0,0.7); }
body.light-mode #lamp-btn {
  background:rgba(255,255,255,0.7); border-color:rgba(0,0,0,0.2);
}
body.light-mode #lamp-btn:hover { background:rgba(255,255,255,0.9); }
body.light-mode { background:#eee; }
body.light-mode #stage {
  background: repeating-conic-gradient(#e0e0e0 0% 25%, #d8d8d8 0% 50%) 0 0 / 20px 20px;
}

#restore-handle {
  display: none;
  position: fixed;
  bottom: 62px;
  right: 20px;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border: 0.5px solid rgba(255,255,255,0.15);
  padding: 6px 10px;
  cursor: pointer;
  z-index: 30;
  font-family: inherit;
}
#restore-handle:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3); }
body.light-mode #restore-handle {
  color: rgba(0,0,0,0.45); background: rgba(255,255,255,0.7);
  border-color: rgba(0,0,0,0.15);
}
body.light-mode #restore-handle:hover { color: rgba(0,0,0,0.8); }

/* Animate button active state */
#animebtn.active {
  border-color: rgba(255,255,255,0.6);
  color: #fff;
  background: rgba(255,255,255,0.08);
}
body.light-mode #animebtn.active {
  border-color: rgba(0,0,0,0.5);
  color: #000;
  background: rgba(0,0,0,0.06);
}
</style>
</head>

function rnd(a, b) { return a + Math.random() * (b - a); }

function rotatedBBox(cx, cy, w, h, rotDeg) {
  const r = rotDeg * Math.PI / 180;
  const hw = w/2, hh = h/2;
  const corners = [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([x,y]) => [
    cx + x*Math.cos(r) - y*Math.sin(r),
    cy + x*Math.sin(r) + y*Math.cos(r)
  ]);
  const xs = corners.map(c=>c[0]), ys = corners.map(c=>c[1]);
  return { minX:Math.min(...xs), maxX:Math.max(...xs), minY:Math.min(...ys), maxY:Math.max(...ys) };
}

function applyContentScale() {

    `translate(${500+panOffset.x},${500+panOffset.y}) scale(${contentScale}) translate(-500,-500)`);
  zoomLabel.textContent = Math.round(contentScale * 100) + '%';
  if (selectedId) drawOverlay();
}

}

window.addEventListener('wheel', (e) => {

  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  contentScale = Math.max(0.1, Math.min(6.0, contentScale * factor));
  applyContentScale();

// ── Drag logic ────────────────────────────────────────────────────────
// Each draggable <g> has a data-tx / data-ty attribute for its current
// translation offset (on top of the generated position).
// We intercept pointer events on the SVG.

let dragging = null; // { el, startPtrX, startPtrY, startTx, startTy }

function getUX(id) { return userXform[id] || {ux:0,uy:0,us:100,ur:0}; }

function applyElemXform(el) {
  const id = el.id;
  const d  = elemData[id];
  const u  = getUX(id);
  const tx = parseFloat(el.dataset.tx || 0);
  const ty = parseFloat(el.dataset.ty || 0);
  const s  = u.us / 100;

  if (!d) return;

  const fcx  = d.cx + tx + u.ux;
  const fcy  = d.cy + ty + u.uy;
  const frot = d.rot + u.ur;

  if (id === 'handle-el') {
    // Handle has nested inner group — just apply position + rotation + scale around center
    // Inner group handles its own path positioning
    el.setAttribute('transform',
      `translate(${fcx.toFixed(2)},${fcy.toFixed(2)}) rotate(${frot.toFixed(3)}) scale(${s.toFixed(4)})`);
  } else {
    // Strokes: translate(center) rotate scale translate(-half) pathscale
    // scale BEFORE offset so path stays centered
    const hw = (d.w / 2).toFixed(2);
    const hh = (d.h / 2).toFixed(2);
    el.setAttribute('transform',
      `translate(${fcx.toFixed(2)},${fcy.toFixed(2)}) rotate(${frot.toFixed(3)}) scale(${s.toFixed(4)}) translate(-${hw},-${hh}) scale(${d.sx.toFixed(6)},${d.sy.toFixed(6)})`);
  }
}

function updateDraggableTransform(el) {
  applyElemXform(el);
}

const overlay  = document.getElementById('xform-overlay');
const toolbar  = document.getElementById('xform-toolbar');
const NAMES    = {'el-0':'Stroke 1','el-1':'Stroke 2','el-2':'Stroke 3','handle-el':'Handle'};

function selectEl(el) {
  if (!el.id) return;
  deselectEl();
  selectedId = el.id;
  if (!userXform[selectedId]) userXform[selectedId] = {ux:0,uy:0,us:100,ur:0};
  drawOverlay();

  syncTB();

  document.getElementById('tb-remove').style.display = isHandle ? 'block' : 'none';
  document.getElementById('tb-remove-sep').style.display = isHandle ? 'block' : 'none';
}
function deselectEl() {
  selectedId = null;
  overlay.innerHTML = '';
  toolbar.classList.remove('visible');
}
function syncTB() {
  if (!selectedId) return;
  const u = getUX(selectedId);
  document.getElementById('tb-sv').textContent = Math.round(u.us)+'%';
  document.getElementById('tb-rv').textContent = Math.round(u.ur)+'°';
}
function posToolbar() {
  const r = frame.getBoundingClientRect();
  toolbar.style.left = (r.left + r.width/2)+'px';
  toolbar.style.top  = (r.top + 14)+'px';
  toolbar.style.transform = 'translateX(-50%)';
}

function svgToScreen(sx, sy) {
  const r = frame.getBoundingClientRect();
  const px = r.width;
  const wx = (sx-500)*contentScale + 500 + panOffset.x;
  const wy = (sy-500)*contentScale + 500 + panOffset.y;
  return { x: r.left + wx*(px/1000), y: r.top + wy*(px/1000) };
}
function screenToSVG(px_s, py_s) {
  const r  = frame.getBoundingClientRect();
  const sz = r.width;                       // frame pixel size
  // 1. map screen → SVG viewBox coords (0..1000)
  const vx = (px_s - r.left) * (1000 / sz);
  const vy = (py_s - r.top)  * (1000 / sz);
  // 2. invert content-group transform: translate(500,500) scale(cs) translate(-500,-500)
  //    SVG_local = (viewbox - 500) / contentScale + 500
  // Invert: translate(500+panX,500+panY) scale(cs) translate(-500,-500)
  return {
    x: (vx - (500 + panOffset.x)) / contentScale + 500,
    y: (vy - (500 + panOffset.y)) / contentScale + 500,
  };
}

function drawOverlay() {
  overlay.innerHTML = '';
  if (!selectedId || !elemData[selectedId]) return;
  const ns = 'http://www.w3.org/2000/svg';
  const d  = elemData[selectedId];
  const u  = getUX(selectedId);
  const el = frame.querySelector('#'+selectedId);
  const tx = el ? parseFloat(el.dataset.tx||0) : 0;
  const ty = el ? parseFloat(el.dataset.ty||0) : 0;

  const cx = d.cx + tx + u.ux;
  const cy = d.cy + ty + u.uy;
  const hw = (d.w * u.us/100) / 2;
  const hh = (d.h * u.us/100) / 2;
  const rot = (d.rot + u.ur) * Math.PI/180;

  const corners = [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([lx,ly]) => {
    return svgToScreen(
      lx*Math.cos(rot) - ly*Math.sin(rot) + cx,
      lx*Math.sin(rot) + ly*Math.cos(rot) + cy
    );
  });
  const mids = corners.map((c,i) => {
    const n = corners[(i+1)%4];
    return {x:(c.x+n.x)/2, y:(c.y+n.y)/2};
  });
  const topMid = {x:(corners[0].x+corners[1].x)/2, y:(corners[0].y+corners[1].y)/2};
  const rotH = { x: topMid.x - Math.sin(rot)*30, y: topMid.y - Math.cos(rot)*30 };

  // Dashed border
  const poly = document.createElementNS(ns,'polygon');
  poly.setAttribute('points', corners.map(c=>c.x+','+c.y).join(' '));
  poly.setAttribute('fill','none');
  poly.setAttribute('stroke','rgba(255,255,255,0.75)');
  poly.setAttribute('stroke-width','1');
  poly.setAttribute('stroke-dasharray','4 3');
  overlay.appendChild(poly);

  // Rotation arm
  const arm = document.createElementNS(ns,'line');
  arm.setAttribute('x1',topMid.x); arm.setAttribute('y1',topMid.y);
  arm.setAttribute('x2',rotH.x);   arm.setAttribute('y2',rotH.y);
  arm.setAttribute('stroke','rgba(255,255,255,0.5)'); arm.setAttribute('stroke-width','1');
  overlay.appendChild(arm);

  // Corner handles
  ['nw-resize','ne-resize','se-resize','sw-resize'].forEach((cur,i) => {
    const r = document.createElementNS(ns,'rect');
    r.setAttribute('x',corners[i].x-5); r.setAttribute('y',corners[i].y-5);
    r.setAttribute('width',10); r.setAttribute('height',10);
    r.setAttribute('fill','white'); r.setAttribute('stroke','rgba(0,0,0,0.3)');
    r.setAttribute('stroke-width','1'); r.style.cursor=cur;
    r.style.pointerEvents='all'; r.dataset.handle='scale';
    r.dataset.ci = i;
    overlay.appendChild(r);
  });

  // Edge handles
  mids.forEach(m => {
    const c = document.createElementNS(ns,'circle');
    c.setAttribute('cx',m.x); c.setAttribute('cy',m.y); c.setAttribute('r',4);
    c.setAttribute('fill','white'); c.setAttribute('stroke','rgba(0,0,0,0.3)');
    c.setAttribute('stroke-width','1');
    overlay.appendChild(c);
  });

  // Rotation handle
  const rc = document.createElementNS(ns,'circle');
  rc.setAttribute('cx',rotH.x); rc.setAttribute('cy',rotH.y); rc.setAttribute('r',6);
  rc.setAttribute('fill','white'); rc.setAttribute('stroke','rgba(0,0,0,0.3)');
  rc.setAttribute('stroke-width','1'); rc.style.cursor='crosshair';
  rc.style.pointerEvents='all'; rc.dataset.handle='rotate';
  overlay.appendChild(rc);

  // Attach handle events
  overlay.querySelectorAll('[data-handle]').forEach(h => {
    h.addEventListener('pointerdown', onHandleDown);
  });
}

function onHandleDown(e) {
  e.preventDefault(); e.stopPropagation();
  if (!selectedId || !elemData[selectedId]) return;
  dragging = null;  // cancel any regular drag

  const type = e.currentTarget.dataset.handle;
  const d  = elemData[selectedId];
  const u  = getUX(selectedId);
  const el = frame.querySelector('#'+selectedId);
  const tx = el ? parseFloat(el.dataset.tx||0) : 0;
  const ty = el ? parseFloat(el.dataset.ty||0) : 0;

  // Element center in SVG space
  const cx = d.cx + tx + u.ux;
  const cy = d.cy + ty + u.uy;

  const startSVG = screenToSVG(e.clientX, e.clientY);
  const startDist  = Math.hypot(startSVG.x - cx, startSVG.y - cy);
  const startAngle = Math.atan2(startSVG.y - cy, startSVG.x - cx) * 180 / Math.PI;

  handleDragData = {
    type, cx, cy,
    startUs: u.us, startUr: u.ur,
    startDist: Math.max(1, startDist),
    startAngle,
  };

  // Use window-level listeners so drag works even after drawOverlay() rebuilds DOM
  window.addEventListener('pointermove', onHandleMove);
  window.addEventListener('pointerup',   onHandleUp);
}

function onHandleMove(e) {
  if (!handleDragData || !selectedId) return;
  e.preventDefault();

  const hd  = handleDragData;
  const cur = screenToSVG(e.clientX, e.clientY);

  if (!userXform[selectedId]) userXform[selectedId] = {ux:0,uy:0,us:100,ur:0};
  const u = userXform[selectedId];

  if (hd.type === 'rotate') {
    const angle = Math.atan2(cur.y - hd.cy, cur.x - hd.cx) * 180 / Math.PI;
    u.ur = hd.startUr + (angle - hd.startAngle);
  } else {
    // Scale: ratio of distances from element center
    const dist = Math.hypot(cur.x - hd.cx, cur.y - hd.cy);
    u.us = Math.max(10, Math.min(400, hd.startUs * dist / hd.startDist));
  }

  const el = frame.querySelector('#' + selectedId);
  if (el) applyElemXform(el);
  drawOverlay();
  syncTB();
}

function onHandleUp() {
  handleDragData = null;
  window.removeEventListener('pointermove', onHandleMove);
  window.removeEventListener('pointerup',   onHandleUp);
}

    // Start canvas pan on empty space click
    if (e.target.id === 'mainsvg' || e.target.tagName === 'rect') {
      canvasPan = { startX: e.clientX, startY: e.clientY, startPanX: panOffset.x, startPanY: panOffset.y };
    }
    return;
  }
  selectEl(target);
  e.preventDefault();
  e.stopPropagation();
  const tx = parseFloat(target.dataset.tx || '0');
  const ty = parseFloat(target.dataset.ty || '0');
  dragging = {
    el: target,
    startPtrX: e.clientX,
    startPtrY: e.clientY,
    startTx: tx,
    startTy: ty,
  };
  target.style.cursor = 'grabbing';
}

function onPointerMove(e) {
  // Canvas pan
  if (canvasPan) {
    e.preventDefault();
    const scale = getSVGScale();
    panOffset.x = canvasPan.startPanX + (e.clientX - canvasPan.startX) / scale;
    panOffset.y = canvasPan.startPanY + (e.clientY - canvasPan.startY) / scale;
    applyPan();
    return;
  }
  if (!dragging || handleDragData) return;  // skip if handle drag is active
  e.preventDefault();
  const scale = getSVGScale();
  const dx = (e.clientX - dragging.startPtrX) / scale;
  const dy = (e.clientY - dragging.startPtrY) / scale;
  const newTx = dragging.startTx + dx;
  const newTy = dragging.startTy + dy;
  dragging.el.dataset.tx = newTx;
  dragging.el.dataset.ty = newTy;
  updateDraggableTransform(dragging.el);
  if (selectedId === dragging.el.id) drawOverlay();
}

function onPointerUp(e) {
  canvasPan = null;
  if (!dragging) return;
  dragging.el.style.cursor = 'grab';
  dragging = null;
}

function updateDraggableTransform(el) {
  applyElemXform(el);
}

// ── Generate ──────────────────────────────────────────────────────────
let currentPlacements = [];
let currentBaseH = 500;
let currentStrokeElems = [];

function generate() {
  // Overall tilt — stays in a narrow diagonal range like the reference
  const compRot = rnd(-14, -6);
  const rot0 = compRot + rnd(-2, 2);
  const rot1 = compRot + rnd(-2, 2);
  const rot2 = compRot + rnd(-2, 2);

  // All strokes nearly the same height — ±5% variation max
  const baseH = VH * rnd(0.60, 0.82);
  currentBaseH = baseH;
  const h0 = baseH * rnd(0.95, 1.05);
  const h1 = baseH * rnd(0.95, 1.05);
  const h2 = baseH * rnd(0.95, 1.05);
  const w0 = h0 * S[0].ar;
  const w1 = h1 * S[1].ar;
  const w2 = h2 * S[2].ar;

  // Very tight gap — strokes nearly touching like the reference
  const avgW = (w0 + w1 + w2) / 3;
  const gap01 = avgW * rnd(-0.62, -0.45);  // same as gap12
  const gap12 = avgW * rnd(-0.62, -0.45);  // stroke-2 to stroke-3: tight

  // Ladder stagger — left lowest, right highest
  const staggerTotal = VH * rnd(0.10, 0.22);
  const stagger01    = staggerTotal * rnd(0.40, 0.60);
  const stagger12    = staggerTotal - stagger01;

  const gcx = VW/2, gcy = VH/2;

  const totalW = w0 + w1 + w2 + gap01 + gap12;
  const placements = [
    { cx: gcx - totalW/2 + w0/2,                          cy: gcy + stagger01, w:w0, h:h0, rot:rot0 },
    { cx: gcx - totalW/2 + w0 + gap01 + w1/2,             cy: gcy,             w:w1, h:h1, rot:rot1 },
    { cx: gcx - totalW/2 + w0 + gap01 + w1 + gap12 + w2/2, cy: gcy - stagger12, w:w2, h:h2, rot:rot2 },
  ];

  // Fit to canvas
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  for (const p of placements) {
    const bb = rotatedBBox(p.cx, p.cy, p.w, p.h, p.rot);
    minX=Math.min(minX,bb.minX); maxX=Math.max(maxX,bb.maxX);
    minY=Math.min(minY,bb.minY); maxY=Math.max(maxY,bb.maxY);
  }

  const TEXT_H = 55;
  const availW = VW - PAD*2, availH = VH - PAD*2 - TEXT_H;
  const scale = Math.min(1.0, availW/(maxX-minX), availH/(maxY-minY));

  const scaledCx = (minX+maxX)/2*scale;
  const scaledCy = (minY+maxY)/2*scale;
  const shiftX = VW/2 - scaledCx;
  const shiftY = (VH - TEXT_H)/2 - scaledCy;

  currentPlacements = placements.map(p => ({
    ...p,
    finalCx: p.cx*scale+shiftX,
    finalCy: p.cy*scale+shiftY,
    fw: p.w*scale,
    fh: p.h*scale,
  }));

  // Store element bounding data for overlay handles
  currentPlacements.forEach((p, i) => {
    elemData['el-'+i] = { cx:p.finalCx, cy:p.finalCy, w:p.fw, h:p.fh, rot:p.rot, sx:(p.fw/S[i].w), sy:(p.fh/S[i].h) };
  });
  const HW = VW*0.38, HH = HW*(180/907);
  elemData['handle-el'] = { cx:690.0, cy:860.0, w:380, h:75.4, rot:0, sx:0.418964, sy:0.418964 };

  // Build SVG
  const strokeEls = currentPlacements.map((p, i) => {
    const baseTransform = ''; // replaced below
    const scaleX = (p.fw / S[i].w).toFixed(6);
    const scaleY = (p.fh / S[i].h).toFixed(6);
    const fixedBaseTransform = `translate(${p.finalCx.toFixed(1)},${p.finalCy.toFixed(1)}) rotate(${p.rot.toFixed(2)}) translate(${(-p.fw/2).toFixed(1)},${(-p.fh/2).toFixed(1)}) scale(${scaleX},${scaleY})`;
    return `<g id="el-${i}" class="draggable" data-tx="0" data-ty="0" data-base-transform="${fixedBaseTransform}" transform="${fixedBaseTransform}">
      <path d="${S[i].p}" fill="${lightMode ? '#1a1a1a' : 'white'}" fill-rule="evenodd"/>
    </g>`;
  });


  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${VW} ${VH}" id="mainsvg">
  <rect width="${VW}" height="${VH}" fill="${lightMode ? 'white' : 'black'}"/>
  <g id="content-group" transform="translate(${500+panOffset.x},${500+panOffset.y}) scale(${contentScale}) translate(-500,-500)">
    <g id="stroke-group">
      ${strokeEls.join('\n      ')}
    </g>
    <g id="handle-el" class="draggable"
        data-tx="${handleOffset.tx}" data-ty="${handleOffset.ty}"
        data-base-transform="translate(0,0)"
        transform="translate(${handleOffset.tx},${handleOffset.ty})">
      <rect x="-200" y="-47" width="400" height="94" fill="transparent" style="cursor:grab"/>
      <g transform="translate(-190.0,-37.7) scale(0.418964)">
        <path d="M 59.500 36.470 C 35.324 41.750, 18.762 62.038, 18.660 86.500 C 18.541 114.819, 37.344 135.427, 66.040 138.430 C 76.801 139.556, 92.988 135.024, 101.395 128.531 C 103.233 127.111, 103.210 126.964, 100.622 123.571 L 97.954 120.073 93.227 123.077 C 80.303 131.289, 61.207 131.480, 47.647 123.533 C 33.375 115.169, 24.742 96.243, 27.771 79.957 C 31.264 61.174, 45.164 48.007, 64.825 44.856 C 88.208 41.109, 109.375 56.582, 110.778 78.448 C 111.526 90.098, 107.497 98.685, 99.316 102.880 C 93.974 105.619, 94 105.719, 94 82.943 L 94 61.885 89.750 62.193 C 85.748 62.482, 85.482 62.692, 85.183 65.795 L 84.867 69.090 81.461 66.100 C 73.216 58.860, 60.301 59.527, 52.458 67.597 C 40.211 80.198, 43.751 105.083, 58.718 111.599 C 65.734 114.654, 78.948 112.420, 83 107.493 C 84.397 105.795, 84.534 105.938, 85 109.585 C 85.496 113.466, 85.535 113.497, 89.500 113.198 C 108.255 111.784, 120 99.172, 120 80.446 C 120 51.238, 90.398 29.721, 59.500 36.470 M 132.093 56.702 C 132.686 58.241, 137.821 71.875, 143.503 87 C 149.185 102.125, 154.151 115.305, 154.539 116.290 C 155.145 117.827, 156.306 118.039, 162.775 117.790 L 170.305 117.500 182.142 86 C 188.652 68.675, 193.984 54.388, 193.989 54.250 C 193.995 54.112, 191.346 54, 188.102 54 L 182.205 54 173.010 78.750 C 167.953 92.363, 163.487 104.088, 163.086 104.807 C 162.654 105.581, 158.466 95.599, 152.809 80.307 L 143.261 54.500 137.137 54.202 L 131.013 53.905 132.093 56.702 M 201.093 56.702 C 201.686 58.241, 206.821 71.875, 212.503 87 C 218.185 102.125, 223.151 115.305, 223.539 116.290 C 224.145 117.827, 225.306 118.039, 231.775 117.790 L 239.305 117.500 251.142 86 C 257.652 68.675, 262.984 54.388, 262.989 54.250 C 262.995 54.112, 260.346 54, 257.102 54 L 251.205 54 242.010 78.750 C 236.953 92.363, 232.487 104.088, 232.086 104.807 C 231.654 105.581, 227.466 95.599, 221.809 80.307 L 212.261 54.500 206.137 54.202 L 200.013 53.905 201.093 56.702 M 270.093 56.702 C 270.686 58.241, 275.821 71.875, 281.503 87 C 287.185 102.125, 29       </g>
    </g>
  </g>
</svg>`;
  frame.innerHTML = svgStr;

  // Attach drag events to SVG
  const svg = frame.querySelector('svg');
  svg.addEventListener('pointerdown', onPointerDown);
  svg.addEventListener('pointermove', onPointerMove);
  svg.addEventListener('pointerup', onPointerUp);
  svg.addEventListener('pointerleave', onPointerUp);
  // Re-apply user transforms and redraw overlay
  frame.querySelectorAll('.draggable').forEach(el => {
    if (el.id && (userXform[el.id] || el.id === 'handle-el')) applyElemXform(el);
  });
  // Restore handle visibility state
  const hEl = frame.querySelector('#handle-el');
  if (hEl && !handleVisible) hEl.style.display = 'none';
  if (selectedId) {
    const sel = frame.querySelector('#'+selectedId);
    if (sel) { drawOverlay(); posToolbar(); } else deselectEl();
  }
}

// ── Save SVG ──────────────────────────────────────────────────────────
document.getElementById('savebtn').addEventListener('click', () => {
  const svg = frame.querySelector('svg');
  if (!svg) return;

  const px = Math.round(BASE_PX * zoomLevel);
  const fgColor = lightMode ? '#1a1a1a' : 'white';

  // Clone SVG for export
  const clone = svg.cloneNode(true);
  clone.setAttribute('width', px);
  clone.setAttribute('height', px);
  clone.removeAttribute('id');
  clone.querySelectorAll('.draggable').forEach(el => el.removeAttribute('class'));

  // Transparent background
  const bg = clone.querySelector('rect');
  if (bg) bg.setAttribute('fill', 'none');

  // Ensure all paths use the correct fg color
  clone.querySelectorAll('path').forEach(p => p.setAttribute('fill', fgColor));

  // SVG → PNG via canvas
  const svgStr = '<?xml version="1.0" encoding="UTF-8"?>\n' +
    new XMLSerializer().serializeToString(clone);
  const blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = px; canvas.height = px;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, px, px);
    ctx.drawImage(img, 0, 0, px, px);
    URL.revokeObjectURL(url);
    canvas.toBlob(pngBlob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(pngBlob);
      a.download = 'vvv_logo.png';
      a.click();
    }, 'image/png');
  };
  img.src = url;
});


// ── Wind animation ─────────────────────────────────────────────────────
let animating = false;
let animRAF = null;
let animStart = null;

// Per-stroke wind parameters — different phase and amplitude for each
const windParams = [
  { phase: 0,    freq: 0.0007, sway: 3.0, lean: 1.0, shimmer: 0.4, pivot: 0.85 },
  { phase: 2.1,  freq: 0.0009, sway: 2.5, lean: 0.8, shimmer: 0.3, pivot: 0.80 },
  { phase: 4.3,  freq: 0.0011, sway: 2.0, lean: 0.7, shimmer: 0.3, pivot: 0.78 },
];

function getWindAngle(p, t) {
  // Subtract initial value so rotation is always 0 at t=0 (no jump on start)
  const f = p.freq, ph = p.phase;
  return p.sway    * (Math.sin(f       * t + ph)         - Math.sin(ph))
       + p.lean    * (Math.sin(f * 1.7 * t + ph + 1.3)   - Math.sin(ph + 1.3))
       + p.shimmer * (Math.sin(f * 5.1 * t + ph + 0.7)   - Math.sin(ph + 0.7));
}

function animFrame(ts) {
  if (!animating) return;
  if (!animStart) animStart = ts;
  const t = ts - animStart;

  for (let i = 0; i < 3; i++) {
    const el = frame.querySelector('#el-' + i);
    const d  = elemData['el-' + i];
    if (!el || !d) continue;

    const u  = getUX('el-' + i);
    const tx = parseFloat(el.dataset.tx || 0);
    const ty = parseFloat(el.dataset.ty || 0);
    const s  = u.us / 100;
    const p  = windParams[i];

    // Wind rotation — zero at t=0 guaranteed by getWindAngle formula
    const windRot = getWindAngle(p, t);

    const fcx  = d.cx + tx + u.ux;
    const fcy  = d.cy + ty + u.uy;
    const frot = d.rot + u.ur + windRot;  // add wind on top of base rotation
    const hw   = (d.w / 2).toFixed(2);
    const hh   = (d.h / 2).toFixed(2);

    // Identical to applyElemXform except frot includes windRot
    // At windRot=0: exactly matches static → no jump on start
    el.setAttribute('transform',
      `translate(${fcx.toFixed(2)},${fcy.toFixed(2)}) rotate(${frot.toFixed(3)}) scale(${s.toFixed(4)}) translate(-${hw},-${hh}) scale(${d.sx.toFixed(6)},${d.sy.toFixed(6)})`
    );
  }

  animRAF = requestAnimationFrame(animFrame);
}

function startAnim() {
  animating = true;
  animStart = null;
  document.getElementById('animebtn').classList.add('active');
  document.getElementById('animebtn').textContent = 'Stop';
  deselectEl();
  animRAF = requestAnimationFrame(animFrame);
}

function stopAnim() {
  animating = false;
  if (animRAF) cancelAnimationFrame(animRAF);
  animRAF = null;
  animStart = null;
  document.getElementById('animebtn').classList.remove('active');
  document.getElementById('animebtn').textContent = 'Animate';
  // Restore strokes to their proper static transforms
  for (let i = 0; i < 3; i++) {
    const el = frame.querySelector('#el-' + i);
    if (el) applyElemXform(el);
  }
}

document.getElementById('animebtn').addEventListener('click', () => {
  animating ? stopAnim() : startAnim();
});

// Stop animation when generate is pressed
const _origGenerate = generate;
// Wrap generate to stop anim first
document.getElementById('genbtn').addEventListener('click', () => {
  if (animating) stopAnim();
});

document.getElementById('genbtn').addEventListener('click', generate);

document.getElementById('tb-remove').addEventListener('click', () => {
  handleVisible = false;
  deselectEl();

  if (h) h.style.display = 'none';

});

// ── Light/dark toggle ──────────────────────────────────────────────────
document.getElementById('lamp-btn').addEventListener('click', () => {
  lightMode = !lightMode;
  document.body.classList.toggle('light-mode', lightMode);

  // Update lamp icon color
  const lampSvg = document.querySelector('#lamp-btn svg');
  if (lampSvg) lampSvg.style.color = lightMode ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.7)';

  // Just swap colors in the existing SVG — do NOT regenerate
  const svg = frame.querySelector('svg');
  if (!svg) return;
  const bg = svg.querySelector('rect');
  const fg = lightMode ? '#1a1a1a' : 'white';
  const bg_color = lightMode ? 'white' : 'black';
  if (bg) bg.setAttribute('fill', bg_color);
  svg.querySelectorAll('path').forEach(p => p.setAttribute('fill', fg));

  // Redraw overlay if active (color doesn't affect overlay but keeps it in sync)
  if (selectedId) drawOverlay();
});
